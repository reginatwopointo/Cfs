openapi: 3.0.3
info:
  title: OpenCTI Filigran Threat Intelligence
  description: |
    Read-only access to an OpenCTI / Filigran instance through its GraphQL endpoint.
    Each skill wraps a single, fixed GraphQL query; Security Copilot only supplies
    the user-controlled GraphQL variables (e.g. the observable value to search for).
  version: "1.0.0"

servers:
  # This is overridden at runtime by the `InstanceURL` setting in the plugin manifest
  # (EndpointUrlSettingName: InstanceURL). Kept here so the spec is valid standalone.
  - url: https://accentureci.octi.filigran.io
    description: OpenCTI Filigran instance (overridden by InstanceURL setting)

paths:
  /graphql:
    post:
      operationId: lookupObservable
      summary: Look up a STIX cyber observable in OpenCTI and return its full threat-intel context.
      description: |
        Looks up a STIX cyber observable in OpenCTI by value and returns its full
        threat-intel context: labels, markings, creator identity, linked indicators
        (with patterns, confidence, validity, external references), reports
        referencing the observable, and STIX core relationships out to and from
        related malware, threat actors, intrusion sets, campaigns, MITRE ATT&CK
        attack patterns, tools, vulnerabilities, infrastructure, and organizations.

        INVOKE THIS SKILL WHENEVER the input is a STIX cyber observable value -
        including when the input is a bare value with no descriptive text. The
        following input shapes should always route to this skill:
          - A 32-character hex string (MD5 file hash)
          - A 40-character hex string (SHA1 file hash)
          - A 64-character hex string (SHA256 file hash)
          - An IPv4 address (dotted quad) or IPv6 address
          - A domain name (e.g. example.com, sub.example.co.uk)
          - A URL (http://, https://, or defanged hxxp[s]://)
          - An email address
          - Any other STIX cyber observable value (mutex, Windows registry key,
            user-agent, file path, MAC address, etc.)

        Pass the input verbatim as the `search` variable - do not paraphrase,
        wrap in quotes, prepend labels like "hash:", or otherwise modify it.

        #ExamplePrompts 7c1f99dca8e5a7897892f9d224a6495023a2cfd2671697d229d355978c415ed2
        #ExamplePrompts 44d88612fea8a8f36de82e1278abb02f
        #ExamplePrompts 3395856ce81f2b7382dee72602f798b642f14140
        #ExamplePrompts 1.2.3.4
        #ExamplePrompts 2606:4700:4700::1111
        #ExamplePrompts evil.example.com
        #ExamplePrompts https://malicious.example/path
        #ExamplePrompts phish@example.com
        #ExamplePrompts Look up the file hash 7c1f99dca8e5a7897892f9d224a6495023a2cfd2671697d229d355978c415ed2 in OpenCTI
        #ExamplePrompts What does OpenCTI know about the SHA256 <hash>?
        #ExamplePrompts Enrich the IP 1.2.3.4 using OpenCTI
        #ExamplePrompts Search OpenCTI for the domain example.com and show linked threat actors
        #ExamplePrompts Pull OpenCTI context for the URL https://malicious.example/path
        #ExamplePrompts Get threat intel from OpenCTI for the email phish@example.com
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LookupObservableRequest'
      responses:
        '200':
          description: GraphQL response. Per the GraphQL spec, business-level errors are returned with HTTP 200 in the `errors` field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LookupObservableResponse'
        '401':
          description: Authentication failed. Check the API token configured for the plugin.
        '403':
          description: The configured token does not have permission to query this observable.

components:
  schemas:

    LookupObservableRequest:
      type: object
      required:
        - query
        - variables
      properties:
        query:
          type: string
          description: |
            The GraphQL query string. This field has exactly one valid value -
            send it verbatim from the enum. Do not paraphrase, shorten, or
            modify it. The only user-supplied input is the `search` field
            inside `variables`.
          enum:
            - |
              query LookupObservable($search: String!) {
                stixCyberObservables(search: $search) {
                  edges {
                    node {
                      id
                      entity_type
                      observable_value
                      x_opencti_score
                      x_opencti_description
                      objectLabel { value }
                      indicators {
                        edges {
                          node {
                            name
                            pattern
                            pattern_type
                            confidence
                            x_opencti_score
                            valid_from
                            valid_until
                            indicator_types
                            revoked
                          }
                        }
                      }
                      reports {
                        edges {
                          node {
                            name
                            description
                            published
                            report_types
                          }
                        }
                      }
                      stixCoreRelationships {
                        edges {
                          node {
                            relationship_type
                            confidence
                            start_time
                            stop_time
                            to {
                              ... on StixCoreObject {
                                entity_type
                                ... on Malware { name }
                                ... on ThreatActor { name }
                                ... on IntrusionSet { name }
                                ... on Campaign { name }
                                ... on AttackPattern { name x_mitre_id }
                                ... on Tool { name }
                                ... on Vulnerability { name }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
        variables:
          type: object
          required:
            - search
          properties:
            search:
              type: string
              description: |
                The observable value to look up, passed VERBATIM with no
                modification. Acceptable values: a file hash (32-char MD5,
                40-char SHA1, or 64-char SHA256 hex), an IPv4 or IPv6 address,
                a domain name, a URL, an email address, or another STIX cyber
                observable.

                Rules for the caller (planning LLM or agent):
                  - Do NOT wrap the value in quotes.
                  - Do NOT prepend labels like "hash:", "sha256:", "ip:", etc.
                  - Do NOT change case (hex hashes are case-insensitive in
                    OpenCTI, but pass through as received).
                  - Do NOT strip URL schemes or trailing slashes.
                  - If the input is defanged (e.g. "1[.]2[.]3[.]4" or
                    "hxxps://evil[.]com"), re-fang it before passing.
                  - If the input contains multiple values, call this skill
                    once per value rather than concatenating.
              example: "7c1f99dca8e5a7897892f9d224a6495023a2cfd2671697d229d355978c415ed2"

    LookupObservableResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            stixCyberObservables:
              type: object
              properties:
                edges:
                  type: array
                  items:
                    type: object
                    properties:
                      node:
                        $ref: '#/components/schemas/StixCyberObservableNode'
        errors:
          type: array
          description: GraphQL-level errors, if any.
          items:
            type: object
            properties:
              message: { type: string }
              path:
                type: array
                items: { type: string }

    StixCyberObservableNode:
      type: object
      properties:
        id: { type: string }
        standard_id: { type: string }
        entity_type:
          type: string
          description: STIX type, e.g. StixFile, IPv4-Addr, Domain-Name, Url, Email-Addr.
        observable_value: { type: string }
        x_opencti_score:
          type: integer
          description: OpenCTI confidence score (0-100).
        x_opencti_description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        createdBy:
          type: object
          properties:
            name: { type: string }
            entity_type: { type: string }
            contact_information: { type: string }
        objectLabel:
          type: array
          items:
            type: object
            properties:
              value: { type: string }
              color: { type: string }
        objectMarking:
          type: array
          items:
            type: object
            properties:
              definition: { type: string }
              definition_type: { type: string }
        indicators:
          type: object
          properties:
            edges:
              type: array
              items:
                type: object
                properties:
                  node:
                    type: object
                    properties:
                      name: { type: string }
                      description: { type: string }
                      pattern: { type: string }
                      pattern_type: { type: string }
                      confidence: { type: integer }
                      x_opencti_score: { type: integer }
                      valid_from: { type: string, format: date-time }
                      valid_until: { type: string, format: date-time }
                      created: { type: string, format: date-time }
                      modified: { type: string, format: date-time }
                      indicator_types:
                        type: array
                        items: { type: string }
                      revoked: { type: boolean }
        reports:
          type: object
          properties:
            edges:
              type: array
              items:
                type: object
                properties:
                  node:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
                      description: { type: string }
                      published: { type: string, format: date-time }
                      confidence: { type: integer }
                      report_types:
                        type: array
                        items: { type: string }
        stixCoreRelationships:
          type: object
          properties:
            edges:
              type: array
              items:
                type: object
                properties:
                  node:
                    type: object
                    properties:
                      id: { type: string }
                      relationship_type: { type: string }
                      description: { type: string }
                      confidence: { type: integer }
                      start_time: { type: string, format: date-time }
                      stop_time: { type: string, format: date-time }
                      from:
                        type: object
                        description: Source STIX core object of the relationship.
                      to:
                        type: object
                        description: Target STIX core object of the relationship.
