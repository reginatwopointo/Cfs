openapi: 3.0.3

info:
  title: Splunk Mission Control - Create Investigation
  description: >
    Creates a Mission Control investigation in Splunk Enterprise Security by calling the Splunk Cloud management API directly.
    Accepts one or more finding_ids in the format {GUID}@@notable@@{timestamp} to link the investigation to its source Splunk ES notable events.
  version: "1.0.0"

servers:
  - url: https://es-dev-accenture.splunkcloud.com:8089
    description: Splunk Cloud management API (port 8089)

security:
  - ApiKeyAuth: []

components:

  securitySchemes:
    # Aligned to the manifest Authorization Type: APIKey
    # Token is injected as: Authorization: Bearer <token>
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: >
        Splunk Cloud JWT Bearer token. Passed as:
        Authorization: Bearer <jwt>

  schemas:

    CreateInvestigationRequest:
      type: object
      required:
        - name
        - finding_ids
      properties:
        name:
          type: string
          description: Display name for the investigation in the MC analyst queue (required).
          example: "Malicious URL Click Permitted"
        description:
          type: string
          description: >
            Free-text summary of the security event, including source IP, affected user, host, and triggering correlation rule name.
          example: "15 failed logins from 192.168.1.100 against jdoe@contoso.com"
        investigation_type:
          type: string
          description: >
            Classification of the investigation aligned to your SOC taxonomy.
            Examples: Credential Attack, Malware, Lateral Movement, Phishing, Ransomware, Insider Threat.
          example: "Credential Attack"
        urgency:
          type: string
          description: >
            Urgency level mapped directly from the Splunk ES notable event urgency field. Use the Splunk value as-is.
          enum: 
            - informational
            - low
            - medium
            - high
            - critical
            - Informational
            - Low
            - Medium
            - High
            - Critical
          default: "low"
          example: "low"
        sensitivity:
          type: string
          description: >
            Data sensitivity classification controlling visibility in Mission Control.
          enum:
            - Unassigned
            - White
            - Green
            - Amber
            - Red
          default: "Unassigned"
          example: "Unassigned"
        finding_ids:
          type: string
          description: >
            One or more Splunk ES notable event IDs in the format {GUID}@@notable@@{timestamp}. Each ID links the investigation to its source Splunk finding.
            Example: ec59e1ed-0ed3-419c-b799-ba4a55bcff25@@notable@@time1775681665 (required)
          example: "ec59e1ed-0ed3-419c-b799-ba4a55bcff25@@notable@@time1775681665"

        earliest:
          type: string
          description: >
            Start of the time window Splunk uses to locate the finding
            in index=notable. Uses Splunk relative time syntax.
            Default is -90d to cover findings up to 90 days old.
            Override with a wider window if the alert creation date
            is older than 90 days, for example, 180d or -1y.
            Accepted formats: -30d, -60d, -90d, -180d, -1y,
            or an epoch timestamp integer.
            If the user does not provide this value, always use
            the default of -90d. Do not ask the user for this
            value unless they explicitly want to override it.
          default: "-90d"
          example: "-90d"
 
        latest:
          type: string
          description: >
            End of the time window Splunk uses to locate the finding
            in index=notable. Defaults to now, meaning the current
            time at the point of the API call. Only override this
            if the user needs to scope the lookup to a specific
            past window. If not provided by the user, always
            use the default value of now.
          default: "now"
          example: "now"

    CreateInvestigationResponse:
      type: object
      properties:
        investigation_id:
          type: string
          description: Internal GUID of the created investigation.
          example: "5CCA4678-4495-4FBA-AA14-0D9A1FC342F5"
        display_id:
          type: string
          description: Human-readable ID in ES-XXXXX format shown in the analyst queue.
          example: "ES-00142"
        name:
          type: string
          description: Display name of the created investigation.
          example: "Brute Force Detected - jdoe@contoso.com"
        urgency:
          type: string
          example: "high"
        sensitivity:
          type: string
          example: "Amber"
        status:
          type: string
          example: "Active"
        finding_ids:
          type: string
          description: Echo of the finding_ids confirming the link to source findings.
          example: "ec59e1ed-0ed3-419c-b799-ba4a55bcff25@@notable@@time1775681665"
        created_at:
          type: string
          format: date-time
          example: "2026-05-07T14:32:05Z"

    ErrorResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [ERROR, WARN, FATAL]
              text:
                type: string

paths:

  /servicesNS/nobody/missioncontrol/public/v2/investigations:
    post:
      operationId: CreateMCInvestigation
      summary: Create a Mission Control investigation from Splunk finding IDs
      description: |
        Creates a new Mission Control investigation in Splunk Enterprise Security linked to one or more source notable events via their finding_ids in the format {GUID}@@notable@@{timestamp}.

        The finding_ids field is required and provides bi-directional traceability between the MC investigation and the originating Splunk ES findings. 
        Always provide at least one finding_id.

        Urgency must be one of: informational, low, medium, high, critical.
        Map directly from the Splunk ES notable event urgency field.

        #ExamplePrompts Create a Mission Control investigation for finding ec59e1ed-0ed3-419c-b799-ba4a55bcff25@@notable@@time1775681665
        #ExamplePrompts Start a new Mission Control investigation for this Splunk notable event
        #ExamplePrompts Open an MC investigation for the high urgency brute force finding
        #ExamplePrompts Escalate this Splunk finding to a Mission Control investigation
        #ExamplePrompts Create an investigation in Splunk Mission Control with urgency high
      tags:
        - Mission Control Investigations
        - Mission Control Investigations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvestigationRequest'
            examples:
              malicious_url:
                summary: Malicious URL click permitted
                value:
                  name: "Malicious URL Click Permitted"
                  description: "User clicked a malicious URL permitted through email gateway."
                  investigation_type: "Phishing"
                  urgency: "low"
                  sensitivity: "Unassigned"
                  finding_ids: "b82f951f-150d-4c75-849d-7c5669755406@@notable@@time1776880498"
              brute_force:
                summary: Brute force credential attack
                value:
                  name: "Brute Force Detected - jdoe@contoso.com"
                  description: "15 failed logins from 192.168.1.100 against jdoe@contoso.com within 3 minutes."
                  investigation_type: "Credential Attack"
                  urgency: "high"
                  sensitivity: "Amber"
                  finding_ids: "ec59e1ed-0ed3-419c-b799-ba4a55bcff25@@notable@@time1775681665"
      responses:
        '200':
          description: Investigation successfully created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateInvestigationResponse'
        '400':
          description: >
            Bad request. Common causes: finding_ids missing or malformed,
            name is blank, urgency not in allowed enum.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized. JWT token missing, expired, or malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: >
            Forbidden. Token does not have sufficient permissions.
            Requires ess_analyst role minimum.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: >
            Not found. The finding_id does not exist in Splunk ES
            or is not accessible by the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: >
            Conflict. An investigation already exists for
            this finding_id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded. Retry after the Retry-After interval.
          headers:
            Retry-After:
              schema:
                type: integer
        '500':
          description: Internal server error on the Splunk stack.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
 
tags:
  - name: Mission Control Investigations
    description: >
      Creates investigations in Splunk Enterprise Security Mission Control
      via the confirmed v2 endpoint at port 8089. Requires APIKey auth
      with Bearer scheme. finding_ids must be a single string value in
      {GUID}@@notable@@{timestamp} format.
