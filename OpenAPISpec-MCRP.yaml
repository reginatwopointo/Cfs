openapi: 3.0.3

info:
  title: Splunk Mission Control - Attach Response Plan
  description: >
    Attaches a response plan to an existing Mission Control investigation
    in Splunk Enterprise Security via the Splunk Cloud management API.
    Requires the investigation GUID from a previously created investigation
    and the response plan ID to attach.
    Authentication uses a Bearer JWT token configured in the Security
    Copilot plugin manifest.
  version: "1.0.0"

servers:
  - url: https://es-dev-accenture.splunkcloud.com:8089
    description: Splunk Cloud management API (port 8089)

security:
  - ApiKeyAuth: []

components:

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: >
        Splunk Cloud JWT Bearer token injected by Security Copilot
        as configured in the plugin manifest Authorization block.
        Header value format: Bearer <jwt>

  schemas:

    AttachResponsePlanRequest:
      type: object
      required:
        - response_plan_id
      properties:

        response_plan_id:
          type: string
          description: >
            The GUID of the response plan to attach to the investigation.
            Obtain this from the Mission Control response plans library
            in Splunk ES. Format is a standard UUID.
            Example: e636dfd0-62b2-4cad-9eda-1706e5bf32bc
          example: "e636dfd0-62b2-4cad-9eda-1706e5bf32bc"

    AttachResponsePlanResponse:
      type: object
      properties:

        investigation_id:
          type: string
          description: >
            GUID of the investigation the response plan was attached to.
          example: "8afcb116-632c-4f4f-bc35-9a7557b62c82"

        response_plan_id:
          type: string
          description: >
            GUID of the response plan that was attached.
          example: "e636dfd0-62b2-4cad-9eda-1706e5bf32bc"

        status:
          type: string
          description: >
            Status of the attachment operation.
          example: "attached"

        name:
          type: string
          description: >
            Display name of the attached response plan as it appears
            in the Mission Control investigation.
          example: "Phishing Response Playbook"

        attached_at:
          type: string
          format: date-time
          description: UTC timestamp of when the response plan was attached.
          example: "2026-05-08T14:00:00Z"

    ErrorResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [ERROR, WARN, FATAL]
              text:
                type: string
                description: Human-readable error message.

paths:

  /servicesNS/nobody/missioncontrol/public/v2/investigations/{investigation_id}/responseplans:
    post:
      operationId: AttachResponsePlan
      summary: Attach a response plan to a Mission Control investigation
      description: |
        Attaches a response plan to an existing Mission Control investigation
        identified by its investigation GUID. The response plan is identified
        by its response_plan_id in the request body.

        The investigation_id path parameter is the GUID returned when the
        investigation was created via CreateMCInvestigation. It is not the
        display ID (ES-XXXXX) — it must be the full UUID format.
        Example: 8afcb116-632c-4f4f-bc35-9a7557b62c82

        The response_plan_id is the GUID of the response plan from the
        Mission Control response plans library.
        Example: e636dfd0-62b2-4cad-9eda-1706e5bf32bc

        Both IDs must be in standard UUID format
        {8}-{4}-{4}-{4}-{12} hex characters.

        #ExamplePrompts Attach response plan e636dfd0-62b2-4cad-9eda-1706e5bf32bc to investigation 8afcb116-632c-4f4f-bc35-9a7557b62c82
        #ExamplePrompts Add a response plan to the Mission Control investigation
        #ExamplePrompts Attach a playbook to this Mission Control investigation
        #ExamplePrompts Link response plan e636dfd0-62b2-4cad-9eda-1706e5bf32bc to the newly created MC investigation
        #ExamplePrompts Apply response plan to investigation 8afcb116-632c-4f4f-bc35-9a7557b62c82
      tags:
        - Mission Control Response Plans
      parameters:
        - name: investigation_id
          in: path
          required: true
          description: >
            The GUID of the Mission Control investigation to attach the
            response plan to. This is the investigation_id UUID returned
            by the CreateMCInvestigation plugin, not the ES-XXXXX display ID.
          schema:
            type: string
          example: "8afcb116-632c-4f4f-bc35-9a7557b62c82"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachResponsePlanRequest'
            examples:
              phishing_plan:
                summary: Attach phishing response plan to investigation
                value:
                  response_plan_id: "e636dfd0-62b2-4cad-9eda-1706e5bf32bc"
              malware_plan:
                summary: Attach malware response plan to investigation
                value:
                  response_plan_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        '200':
          description: Response plan successfully attached to the investigation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachResponsePlanResponse'
              example:
                investigation_id: "8afcb116-632c-4f4f-bc35-9a7557b62c82"
                response_plan_id: "e636dfd0-62b2-4cad-9eda-1706e5bf32bc"
                status: "attached"
                name: "Phishing Response Playbook"
                attached_at: "2026-05-08T14:00:00Z"
        '400':
          description: >
            Bad request. Common causes: response_plan_id missing or
            malformed, investigation_id not in valid UUID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized. JWT token missing, expired, or malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: >
            Forbidden. Token does not have sufficient permissions to
            attach response plans. Requires ess_analyst role minimum.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: >
            Not found. The investigation_id or response_plan_id does not
            exist or is not accessible by the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: >
            Conflict. This response plan is already attached to the
            specified investigation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded. Retry after the Retry-After interval.
          headers:
            Retry-After:
              schema:
                type: integer
        '500':
          description: Internal server error on the Splunk stack.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

tags:
  - name: Mission Control Response Plans
    description: >
      Attaches response plans to existing Mission Control investigations
      in Splunk Enterprise Security via the v2 API on port 8089.
      Requires the investigation GUID (not ES-XXXXX display ID) and
      the response plan GUID. Both must be in standard UUID format.
      Authentication uses APIKey with Bearer scheme matching the
      existing Splunk Security Copilot integration.
